<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ower AI - Intelligent Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-container">
    <div class="particles">
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
    </div>
    <main class="main-content">
      <div class="chat-container">
        <header class="chat-header">
          <div class="header-left">
            <div class="ai-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2L2 7l10 5 10-5-10-5z"></path>
                <path d="M2 17l10 5 10-5"></path>
                <path d="M2 12l10 5 10-5"></path>
              </svg>
            </div>
            <div class="brand-name">
              <h1>Ower AI</h1>
              <p class="tagline">AI ASSISTANT</p>
            </div>
          </div>
          <div class="header-right">
            <div class="connection-status">
              <span class="status-dot"></span>
              <span class="status-text">Online</span>
            </div>
          </div>
        </header>

        <div class="chat-messages" id="chatMessages">
          <div class="welcome-message">
            <div class="welcome-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2L2 7l10 5 10-5-10-5z"></path>
                <path d="M2 17l10 5 10-5"></path>
                <path d="M2 12l10 5 10-5"></path>
              </svg>
            </div>
            <h2>Welcome to Ower AI</h2>
            <p>Your intelligent AI assistant is ready to help</p>
            <div class="welcome-hint">
              <span class="hint-chip">Text Generation</span>
              <span class="hint-chip">Image Creation</span>
              <span class="hint-chip">Video Synthesis</span>
            </div>
          </div>
        </div>

        <footer class="chat-input">
          <div class="attachment-area" id="attachmentArea"></div>
          <div class="input-row">
            <div class="input-wrapper">
              <button id="attachBtn" class="attach-button" type="button">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path>
                </svg>
              </button>
              <input type="file" id="fileInput" multiple accept=".docx,.md,.txt,.xlsx,.png,.jpg,.jpeg,.gif,.webp" style="display:none">
              <input type="text" id="userInput" placeholder="Type your message..." autocomplete="off">
            </div>
            <button id="sendBtn" class="send-button" onclick="sendMessage()">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                <polyline points="22,4 12,14.01 9,11.01"></polyline>
              </svg>
              <span>Send</span>
            </button>
          </div>
        </footer>
      </div>
    </main>
  </div>

  <div class="preview-overlay" id="previewOverlay" onclick="closePreview()">
    <span class="preview-close">&times;</span>
    <div class="preview-container" onclick="event.stopPropagation()">
      <img id="previewImage" class="preview-media" style="display:none" alt="预览">
      <video id="previewVideo" class="preview-media" style="display:none" controls autoplay></video>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="js/app.js"></script>
  <script src="js/init.js"></script>
</body>
</html>
