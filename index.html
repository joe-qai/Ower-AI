<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ower AI Chat Platform</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-container">
    <aside class="sidebar sidebar-left">
      <div class="couplet couplet-upper">算力为墨 数据作宣 绘就智能新画卷</div>
    </aside>
    <main class="main-content">
      <div class="chat-container">
        <header class="chat-header">
          <div class="header-left">
            <div class="brand-icon-small">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 15h-8a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2z"></path>
                <path d="M16 21h2a2 2 0 0 0 2-2v-4"></path>
                <path d="M2 15h8a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2H2a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2z"></path>
                <path d="M8 21H6a2 2 0 0 1-2-2v-4"></path>
              </svg>
            </div>
            <div class="brand-name">
              <h1>Ower AI</h1>
              <p>智能模型聊天平台</p>
            </div>
          </div>
        </header>

        <div class="chat-messages" id="chatMessages">
          <div class="welcome-message">
            <div class="welcome-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 15h-8a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2z"></path>
                <path d="M16 21h2a2 2 0 0 0 2-2v-4"></path>
                <path d="M2 15h8a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2H2a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2z"></path>
                <path d="M8 21H6a2 2 0 0 1-2-2v-4"></path>
              </svg>
            </div>
            <h2>欢迎使用 Ower AI</h2>
         </div>
        </div>

        <footer class="chat-input">
          <div class="input-wrapper">
            <input type="text" id="userInput" placeholder="输入您的消息..." autocomplete="off">
          </div>
          <button id="sendBtn">
            <span class="send-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="m21 15-8-8 8-8"></path>
                <path d="M3 21l8-8-8-8"></path>
              </svg>
            </span>
            发送
          </button>
          <button id="clearBtn">
            <span class="clear-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 6h18"></path>
                <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path>
                <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path>
              </svg>
            </span>
            清空
          </button>
        </footer>
      </div>
    </main>
    <aside class="sidebar sidebar-right">
      <div class="couplet couplet-lower">算法执笔 模型运筹 写就时代大文章</div>
    </aside>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
